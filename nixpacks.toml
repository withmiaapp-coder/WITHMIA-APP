[phases.setup]
  nixPkgs = ['nodejs', 'php83', 'php83Packages.composer', 'postgresql', 'php83Extensions.pdo', 'php83Extensions.pdo_pgsql', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.tokenizer', 'php83Extensions.zip', 'php83Extensions.gd', 'php83Extensions.intl', 'php83Extensions.bcmath', 'php83Extensions.fileinfo', 'php83Extensions.exif']
  nixLibs = ['libjpeg', 'libpng', 'freetype', 'zlib']

[phases.install]
  cmds = [
    'composer update --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs',
    'npm ci --prefer-offline --no-audit',
    'npm run build'
  ]

[phases.build]
  cmds = [
    'php artisan storage:link || true',
    'php artisan migrate --force || true',
    'php artisan route:cache',
    'php artisan view:cache'
  ]

[start]
  cmd = 'php artisan config:clear && php artisan route:clear && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
