[phases.setup]
  nixPkgs = ['nodejs', 'php83', 'php83Packages.composer', 'mysql80', 'php83Extensions.pdo', 'php83Extensions.pdo_mysql', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.tokenizer', 'php83Extensions.zip', 'php83Extensions.gd', 'php83Extensions.intl', 'php83Extensions.bcmath', 'php83Extensions.fileinfo', 'php83Extensions.exif']
  nixLibs = ['libjpeg', 'libpng', 'freetype', 'zlib']

[phases.install]
  cmds = [
    'composer update --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs',
    'npm ci --prefer-offline --no-audit',
    'npm run build'
  ]

[phases.build]
  cmds = [
    'php artisan storage:link || true',
    'php artisan migrate --force || true'
  ]

[start]
  cmd = 'php artisan config:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
