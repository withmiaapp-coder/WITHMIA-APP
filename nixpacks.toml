[phases.setup]
  nixPkgs = ['nodejs', 'php83', 'php83Packages.composer', 'php83Packages.redis', 'php83Extensions.pdo', 'php83Extensions.pdo_mysql', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.tokenizer', 'php83Extensions.zip', 'php83Extensions.redis', 'php83Extensions.gd', 'php83Extensions.intl', 'php83Extensions.bcmath', 'php83Extensions.fileinfo', 'php83Extensions.exif']
  nixLibs = ['libjpeg', 'libpng', 'freetype', 'zlib']
  aptPkgs = ['php-redis']

[phases.install]
  cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs',
    'npm ci --prefer-offline --no-audit',
    'npm run build',
    'chmod +x railway-init.sh'
  ]

[phases.build]
  cmds = [
    'bash railway-init.sh'
  ]

[start]
  cmd = 'php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'
