# nixpacks.toml - Updated 2026-01-30
# Note: Railway will use Dockerfile if present, this is backup config

[phases.setup]
  nixPkgs = ['nodejs', 'php83', 'php83Packages.composer', 'postgresql', 'php83Extensions.pdo', 'php83Extensions.pdo_pgsql', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.tokenizer', 'php83Extensions.zip', 'php83Extensions.gd', 'php83Extensions.intl', 'php83Extensions.bcmath', 'php83Extensions.fileinfo', 'php83Extensions.exif', 'php83Extensions.iconv', 'php83Extensions.pcntl', 'php83Extensions.redis', 'php83Extensions.opcache', 'libiconv', 'ffmpeg']
  nixLibs = ['libjpeg', 'libpng', 'freetype', 'zlib', 'icu']
  nixOverlays = ['https://github.com/railwayapp/nix-npm-overlay/archive/main.tar.gz']

[phases.install]
  cmds = [
    'composer update --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs',
    'npm ci --prefer-offline --no-audit',
    'npm run build'
  ]

[phases.build]
  cmds = [
    'php artisan storage:link || true',
    'php artisan view:cache'
  ]

[start]
  cmd = 'php artisan migrate --force && php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'

