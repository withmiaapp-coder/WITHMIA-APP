# =============================================================================
# Withmia - Self-Hosting Docker Compose
# =============================================================================
# Usage: docker compose up -d
# Docs:  https://github.com/withmiaapp-coder/withmia/wiki/Self-Hosting
# =============================================================================

services:

  # ─── Withmia App ───────────────────────────────────────────────────────────
  withmia:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=withmia
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-withmia}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHATWOOT_URL=http://chatwoot:3000
      - CHATWOOT_DB_HOST=postgres
      - N8N_INTERNAL_URL=http://n8n:5678
      - N8N_PUBLIC_URL=http://localhost:5678
      - EVOLUTION_API_URL=http://evolution:8080
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - withmia_storage:/app/storage
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-withmia}
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Chatwoot ──────────────────────────────────────────────────────────────
  chatwoot:
    image: chatwoot/chatwoot:latest
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: replace_with_secret
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-withmia}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Qdrant ────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  # ─── n8n ───────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-withmia}
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Evolution API (WhatsApp) ──────────────────────────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${POSTGRES_PASSWORD:-withmia}@postgres:5432/evolution
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  n8n_data:
  withmia_storage:
