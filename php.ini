; Custom PHP configuration for Railway
; File upload limits
upload_max_filesize = 50M
post_max_size = 55M
max_file_uploads = 20

; Memory and execution
memory_limit = 256M
max_execution_time = 120
max_input_time = 120

; Error reporting
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
