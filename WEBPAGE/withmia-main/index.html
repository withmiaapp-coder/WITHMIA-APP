          try { return localStorage.getItem('withmia_cookie_consent') === 'granted' ? 'granted' : 'denied'; } catch(e) { return 'denied'; }

        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        wait_for_update: 500
      });
    </script>

      gtag('js', new Date());
