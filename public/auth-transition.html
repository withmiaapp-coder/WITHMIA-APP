<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando... | WITHMIA®</title>
    <link rel="icon" href="/logo-withmia.webp?v=2025-withmia" type="image/webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(76vw 76vw at 12% 18%, rgba(230,184,255,.1) 0%, rgba(230,184,255,.05) 50%, rgba(230,184,255,0) 70%), 
                        radial-gradient(40vw 40vw at 8% 65%, rgba(125,77,255,.35) 0%, rgba(125,77,255,0) 55%), 
                        radial-gradient(40vw 40vw at 85% 82%, rgba(59,195,255,.3) 0%, rgba(59,195,255,0) 55%), 
                        radial-gradient(35vw 35vw at 85% 8%, rgba(230,184,255,.18) 0%, rgba(230,184,255,0) 55%), 
                        radial-gradient(28vw 28vw at 72% 15%, rgba(244,226,166,.44) 0%, rgba(244,226,166,0) 60%), 
                        radial-gradient(22vw 22vw at 28% 88%, rgba(217,178,76,.28) 0%, rgba(217,178,76,0) 60%);
        }

        .transition-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo-video {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15));
        }

        .tagline {
            margin-top: 24px;
            font-size: 1.1em;
            font-weight: 600;
            color: #000;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out 0.3s forwards;
            text-transform: uppercase;
        }

        .tagline strong {
            font-weight: 700;
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(10px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .loading-dots {
            display: flex;
            gap: 6px;
            margin-top: 30px;
            opacity: 0;
            animation: fadeIn 0.4s ease-out 0.6s forwards;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7D4DFF, #3BC3FF);
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        .loading-dots span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="transition-container">
        <video class="logo-video" autoplay loop muted playsinline>
            <source src="/logo-animated.webm" type="video/webm" />
            <img src="/logo-withmia.webp?v=2025-withmia" alt="WITHMIA" class="logo-video" />
        </video>
        
        <p class="tagline">with you, <strong>WITHMIA</strong></p>
        
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script>
        // Redirect después de 2.5 segundos al onboarding
        setTimeout(() => {
            window.location.href = '/onboarding';
        }, 2500);
    </script>
</body>
</html>
